spring.application.name=${SPRING_APP_NAME:demo}
spring.docker.compose.enabled=${SPRING_DOCKER_COMPOSE_ENABLED:false}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Common app settings (profile-specific values are in application-local / application-prod)
server.port=${SERVER_PORT:8080}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.admin.auth.jwt.secret=${APP_ADMIN_JWT_SECRET:local-dev-admin-jwt-secret-change-me-32chars}
app.admin.auth.jwt.expiration-seconds=${APP_ADMIN_JWT_EXPIRATION_SECONDS:43200}
app.admin.auth.password.allow-plaintext-auto-migrate=${APP_ADMIN_PASSWORD_ALLOW_PLAINTEXT_AUTO_MIGRATE:false}

# AWS (future use)
app.aws.s3.enabled=${APP_AWS_S3_ENABLED:false}
app.aws.region=${AWS_REGION:ap-northeast-2}
app.aws.s3.bucket=${AWS_S3_BUCKET:}
app.aws.cloudfront.domain=${AWS_CLOUDFRONT_DOMAIN:}

# Notifications (optional)
app.notify.slack.enabled=${APP_NOTIFY_SLACK_ENABLED:false}
app.notify.slack.webhook-url=${APP_NOTIFY_SLACK_WEBHOOK_URL:}
app.notify.email.enabled=${APP_NOTIFY_EMAIL_ENABLED:false}
app.notify.email.to=${APP_NOTIFY_EMAIL_TO:}
