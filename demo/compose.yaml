services:
  mysql:
    image: "${MYSQL_IMAGE:-mysql:8.4}"
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-giga}"
      MYSQL_USER: "${MYSQL_USER:-giga}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      TZ: "${TZ:-Asia/Seoul}"
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - mysql
    environment:
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-prod}"
      SERVER_PORT: "${SERVER_PORT:-8080}"
      DB_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-giga}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
      DB_USERNAME: "${MYSQL_USER:-giga}"
      DB_PASSWORD: "${MYSQL_PASSWORD}"
      JPA_DDL_AUTO: "${JPA_DDL_AUTO:-validate}"
      JPA_SHOW_SQL: "${JPA_SHOW_SQL:-false}"
      JPA_FORMAT_SQL: "${JPA_FORMAT_SQL:-false}"
      APP_CORS_ALLOWED_ORIGINS: "${APP_CORS_ALLOWED_ORIGINS}"
      APP_ADMIN_JWT_SECRET: "${APP_ADMIN_JWT_SECRET}"
      APP_UPLOAD_DIR: "/app/uploads"
      MAIL_HOST: "${MAIL_HOST:-}"
      MAIL_PORT: "${MAIL_PORT:-25}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_SMTP_AUTH: "${MAIL_SMTP_AUTH:-false}"
      MAIL_SMTP_STARTTLS_ENABLE: "${MAIL_SMTP_STARTTLS_ENABLE:-false}"
      MAIL_SMTP_STARTTLS_REQUIRED: "${MAIL_SMTP_STARTTLS_REQUIRED:-false}"
      MAIL_SMTP_CONNECTION_TIMEOUT: "${MAIL_SMTP_CONNECTION_TIMEOUT:-5000}"
      MAIL_SMTP_TIMEOUT: "${MAIL_SMTP_TIMEOUT:-5000}"
      MAIL_SMTP_WRITE_TIMEOUT: "${MAIL_SMTP_WRITE_TIMEOUT:-5000}"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/uploads

volumes:
  mysql_data:
  backend_uploads:
